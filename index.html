<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>test.glb + 3 SPZ nodes</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #111;
    }

    #playBtn {
      position: fixed;
      top: 16px;
      left: 16px;
      z-index: 10;
      padding: 10px 14px;
      font: 600 14px/1.2 sans-serif;
      border: 1px solid #444;
      border-radius: 6px;
      background: #222;
      color: #fff;
      cursor: pointer;
    }

    #playBtn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    #status {
      position: fixed;
      top: 58px;
      left: 16px;
      z-index: 10;
      color: #ddd;
      font: 12px/1.3 monospace;
      max-width: 420px;
      white-space: pre-wrap;
      background: rgba(0, 0, 0, 0.35);
      padding: 8px;
      border-radius: 6px;
    }
  </style>
</head>
<body>
  <button id="playBtn" disabled>Play `test` animation</button>
  <div id="status">Loading assets...</div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://cdnjs.cloudflare.com/ajax/libs/three.js/0.180.0/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.180.0/examples/jsm/",
        "@sparkjsdev/spark": "https://sparkjs.dev/releases/spark/2.0.0/spark.module.js"
      }
    }
  </script>

  <script type="module">
    import * as THREE from "three";
    import { OrbitControls } from "three/addons/controls/OrbitControls.js";
    import { GLTFLoader } from "three/addons/loaders/GLTFLoader.js";
    import { SparkRenderer, SplatMesh } from "@sparkjsdev/spark";

    const statusEl = document.getElementById("status");
    const playBtn = document.getElementById("playBtn");

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xffffff);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.01, 1000);
    camera.position.set(0, 1.0, 3);

    const renderer = new THREE.WebGLRenderer({ antialias: false });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 1, 0);

    scene.add(new THREE.HemisphereLight(0xffffff, 0x222233, 1.25));
    const dir = new THREE.DirectionalLight(0xffffff, 1.1);
    dir.position.set(3, 6, 5);
    scene.add(dir);

    const spark = new SparkRenderer({ renderer });
    scene.add(spark);

    let mixer = null;
    let testAction = null;
    const clock = new THREE.Clock();

    function setStatus(text) {
      statusEl.textContent = text;
    }

    async function loadScene() {
      playBtn.disabled = true;
      testAction = null;
      mixer = null;
      try {
        const gltfLoader = new GLTFLoader();
        setStatus("Loading test.glb...");
        const gltf = await gltfLoader.loadAsync("./test.glb");
        const glbRoot = gltf.scene;
        scene.add(glbRoot);

        const spzFiles = ["greyscale-room.rad", "tomahawk-niku.rad", "woobles.rad"];
        const targetNodes = glbRoot.children.filter(
          (node) => !node.isCamera && !node.isLight
        );
        const assignmentCount = Math.min(spzFiles.length, targetNodes.length);
        const assignments = [];

        for (let i = 0; i < assignmentCount; i++) {
          const file = spzFiles[i];
          const parentNode = targetNodes[i];
          setStatus(`Loading ${file} for node ${i + 1}/${assignmentCount}...`);
          const splat = new SplatMesh({
            url: `./${file}`,
            // lod: true
          });
          await splat.initialized;
          parentNode.attach(splat);
          assignments.push(`${parentNode.name || `(unnamed node ${i + 1})`} <- ${file}`);
        }

        const box = new THREE.Box3().setFromObject(glbRoot);
        const center = box.getCenter(new THREE.Vector3());
        controls.target.copy(center);

        if (gltf.animations.length > 0) {
          mixer = new THREE.AnimationMixer(glbRoot);
          const testClip = THREE.AnimationClip.findByName(gltf.animations, "test");

          if (testClip) {
            testAction = mixer.clipAction(testClip);
            testAction.loop = THREE.LoopOnce;
            playBtn.disabled = false;
            setStatus(
              `Loaded test.glb with ${assignmentCount} SPZ assignments.\n` +
              assignments.join("\n") +
              "\n\nClick the button to play `test`."
            );
          } else {
            setStatus(
              "Loaded test.glb + SPZ node mapping, but no animation named `test` was found."
            );
          }
        } else {
          setStatus("Loaded test.glb + SPZ node mapping, but test.glb contains no animations.");
        }
      } catch (err) {
        console.error(err);
        setStatus("Failed to load assets.\nRun this page from a local HTTP server in this folder.");
      }
    }

    playBtn.addEventListener("click", () => {
      if (!testAction) return;
      testAction.reset().play();
    });

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    renderer.setAnimationLoop(() => {
      const dt = clock.getDelta();
      if (mixer) mixer.update(dt);
      controls.update();
      renderer.render(scene, camera);
    });

    loadScene();
  </script>
</body>
</html>
